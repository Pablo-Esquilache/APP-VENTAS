<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Gastos</title>
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/gastos.css" />
    <link rel="icon" href="../icons/icon-192.png" type="image/png" />
    <meta name="theme-color" content="#151515" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="app-navbar">
      <div class="app-navbar-logo">MI APP</div>

      <ul class="app-navbar-menu">
        <li><a href="caja.html">Caja</a></li>
        <li id="tab-ventas"><a href="ventas.html">Ventas</a></li>
        <li id="tab-productos"><a href="productos.html">Productos</a></li>
        <li id="tab-clientes"><a href="clientes.html">Clientes</a></li>
        <li id="tab-gastos">
          <a href="gastos.html" class="app-active">Gastos</a>
        </li>
        <li id="tab-reportes"><a href="reportes.html">Reportes</a></li>
        <li id="tab-ajustes" class="app-admin-only"><a href="ajustes.html">Ajustes</a></li>
        <li>
          <span class="user-role-badge"></span>
          <button id="logout-btn">Cerrar Sesión</button>
        </li>
      </ul>
    </nav>

    <!-- CONTENIDO -->
    <main class="app-container">
      <h1 class="app-title">Gestión de Gastos</h1>

      <!-- CONTROLES -->
      <div class="app-controls">
        <input
          type="text"
          id="buscarGasto"
          class="app-input"
          placeholder="Buscar gasto..."
        />

        <select id="filtroTipo" class="app-input">
          <option value="">Todos</option>
          <!-- Dynamic -->
        </select>
        <label for="">Desde</label>
        <input type="date" id="filtroDesde" class="app-input" />
        <label for="">Hasta</label>
        <input type="date" id="filtroHasta" class="app-input" />

        <button id="btnLimpiarFiltrosGasto" class="app-btn-secondary">
          Limpiar filtros
        </button>

        <button id="btnNuevoGasto" class="app-btn-primary">
          Registrar gasto
        </button>
      </div>

      <!-- TABLA -->
      <div class="app-tabla-container">
        <table class="app-tabla">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Descripción</th>
              <th>Tipo</th>
              <th>Importe</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaGastosBody">
            <!-- filas dinámicas -->
          </tbody>
        </table>
      </div>
    </main>

    <!-- MODAL NUEVO GASTO -->
    <div id="modalGasto" class="app-modal">
      <div class="app-modal-content-producto">
        <div class="app-modal-header">
          <h2 class="app-subtitle" id="tituloModalGasto">Nuevo Gasto</h2>
          <button type="button" class="app-close">Cerrar</button>
        </div>

        <form class="app-form-venta">
          <div class="app-form-row">
            <div class="app-form-group">
              <label for="fechaGasto">Fecha</label>
              <input type="date" id="fechaGasto" class="app-input" required />
            </div>

            <div class="app-form-group">
              <label for="descripcionGasto">Descripción</label>
              <input type="text" id="descripcionGasto" class="app-input" required />
            </div>
          </div>

          <div class="app-form-row">
            <div class="app-form-group">
              <label for="tipoGasto">Tipo</label>
              <select id="tipoGasto" class="app-input" required>
                <option value="">Seleccionar</option>
                <!-- Dynamic -->
              </select>
            </div>

            <div class="app-form-group">
              <label for="importeGasto">Importe</label>
              <input
                type="number"
                id="importeGasto"
                class="app-input"
                min="0"
                step="0.01"
                required
              />
            </div>
          </div>
          <button type="submit" class="app-btn-primary app-btn-guardar">
            Guardar
          </button>
        </form>
      </div>
    </div>
    <script src="../js/auth-ui.js"></script>
    <script type="module" src="../js/gastos.js"></script>
    <script type="module" src="../js/logout.js"></script>
    <script type="module" src="../js/system.js"></script>
  </body>
</html>
